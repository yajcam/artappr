            border: 2px solid transparent;
            border-radius: 16px;
            padding: 1rem 1.25rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            transform: translateZ(0);
            will-change: transform, background-color, border-color;
            display: flex;
            align-items: center;
            gap: 1rem;

            justify-content: center;
            width: 32px;
            height: 32px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--accent-primary);
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.875rem;
            flex-shrink: 0;

        .option-text {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 500;
            transition: var(--transition-smooth);
        }

        .option.correct {
            background: rgba(16, 185, 129, 0.15);
            border-color: var(--accent-correct);
        }

        .option.correct .option-letter {
            background: var(--accent-correct);
            color: white;
        }

        .option.correct .option-text {
            color: #065f46;
            font-weight: 600;
        }

        .option.incorrect {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--accent-incorrect);

            color: white;
        }

        .option.incorrect .option-text {
            color: #991b1b;
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

            margin-top: 1.5rem;

            margin-bottom: 0.5rem;

            font-size: 0.95rem;
            color: var(--text-secondary);

            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;

            white-space: nowrap;

    </style>

        // Initialize quiz
        function initQuiz() {
            const container = document.getElementById('quiz-container');
            const progress = document.getElementById('progress');
            
            progress.textContent = `Question 1 of ${quizData.length}`;
            
            quizData.forEach((item, index) => {
                const card = createQuestionCard(item, index);
                container.appendChild(card);
            });
        }

        function createQuestionCard(data, index) {
            const card = document.createElement('section');
            card.className = 'question-card';
            card.setAttribute('role', 'region');
            card.setAttribute('aria-label', `Question ${index + 1}`);
            
            const questionNumber = document.createElement('span');
            questionNumber.className = 'question-number';
            questionNumber.textContent = `Question ${index + 1}`;
            
            const questionText = document.createElement('h2');
            questionText.className = 'question-text';
            questionText.textContent = data.question;
            
            const optionsContainer = document.createElement('div');
            optionsContainer.className = 'options-container';
            optionsContainer.setAttribute('role', 'radiogroup');
            optionsContainer.setAttribute('aria-label', 'Answer options');
            
            data.options.forEach((option, optIndex) => {
                const optionEl = createOption(option, optIndex, data.correct, index);
                optionsContainer.appendChild(optionEl);
            });
            
            const explanation = document.createElement('div');
            explanation.className = 'explanation';
            explanation.id = `explanation-${index}`;
            explanation.setAttribute('role', 'region');
            explanation.setAttribute('aria-label', 'Explanation');
            
            const explanationLabel = document.createElement('div');
            explanationLabel.className = 'explanation-label';
            explanationLabel.textContent = 'Explanation';
            
            const explanationText = document.createElement('div');
            explanationText.className = 'explanation-text';
            explanationText.textContent = data.explanation;
            
            explanation.appendChild(explanationLabel);
            explanation.appendChild(explanationText);
            
            card.appendChild(questionNumber);
            card.appendChild(questionText);
            card.appendChild(optionsContainer);
            card.appendChild(explanation);
            
            return card;
        }

        function createOption(text, index, correctIndex, questionIndex) {
            const option = document.createElement('div');
            option.className = 'option';
            option.setAttribute('role', 'radio');
            option.setAttribute('tabindex', '0');
            option.setAttribute('aria-checked', 'false');
            option.dataset.correct = index === correctIndex;
            option.dataset.questionIndex = questionIndex;
            
            const letter = document.createElement('span');
            letter.className = 'option-letter';
            letter.textContent = String.fromCharCode(65 + index);
            
            const textSpan = document.createElement('span');
            textSpan.className = 'option-text';
            textSpan.textContent = text;
            
            const statusIcon = document.createElement('span');
            statusIcon.className = 'status-icon';
            statusIcon.innerHTML = option.dataset.correct === 'true' 
                ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>'
                : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';
            
            option.appendChild(letter);
            option.appendChild(textSpan);
            option.appendChild(statusIcon);
            
            // Double-click handler
            option.addEventListener('dblclick', handleSelection);
            
            // Keyboard handler
            option.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    handleSelection.call(option);
                }
            });
            
            // Single click handler for accessibility
            option.addEventListener('click', function() {
                // Visual feedback for single click
                this.style.transform = 'scale(0.98)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 100);
            });
            
            return option;
        }

        function handleSelection() {
            const option = this;
            const questionIndex = option.dataset.questionIndex;
            const isCorrect = option.dataset.correct === 'true';
            const card = option.closest('.question-card');
            const allOptions = card.querySelectorAll('.option');
            const explanation = card.querySelector('.explanation');
            
            // Check if already answered
            if (card.dataset.answered === 'true') return;
            
            // Mark as answered
            card.dataset.answered = 'true';
            
            // Disable all options
            allOptions.forEach(opt => {
                opt.classList.add('disabled');
                opt.setAttribute('aria-disabled', 'true');
            });
            
            if (isCorrect) {
                // Correct answer
                option.classList.add('correct');
                option.setAttribute('aria-checked', 'true');
                playSuccessSound();
            } else {
                // Incorrect answer
                option.classList.add('incorrect');
                playErrorSound();
                
                // Find and highlight correct answer
                const correctOption = Array.from(allOptions).find(opt => opt.dataset.correct === 'true');
                if (correctOption) {
                    correctOption.classList.add('correct');
                    correctOption.setAttribute('aria-checked', 'true');
                }
                
                // Remove red highlight after 5 seconds
                setTimeout(() => {
                    option.classList.remove('incorrect');
                }, 5000);
            }
            
            // Show explanation
            setTimeout(() => {
                explanation.classList.add('visible');
            }, 300);
        }

        function playSuccessSound() {
            const audio = document.getElementById('success-sound');
            audio.currentTime = 0;
            audio.play().catch(e => console.log('Audio play failed:', e));
        }

        function playErrorSound() {
            const audio = document.getElementById('error-sound');
            audio.currentTime = 0;
            audio.play().catch(e => console.log('Audio play failed:', e));
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
